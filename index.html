<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VCE Maths Hub</title>
  <style>
    :root {
      --bg-1: #f7f3ea;
      --bg-2: #e8efe9;
      --panel: rgba(255, 255, 255, 0.78);
      --ink: #1d2a30;
      --muted: #617077;
      --accent: #0b8b7c;
      --accent-2: #e59712;
      --line: rgba(29, 42, 48, 0.08);
      --shadow: 0 22px 46px rgba(30, 40, 45, 0.12);
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(229, 151, 18, 0.18), transparent 24%),
        radial-gradient(circle at 88% 16%, rgba(11, 139, 124, 0.18), transparent 22%),
        linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 28px;
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel,
    .card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 28px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      bottom: -40px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(11, 139, 124, 0.14), transparent 68%);
      pointer-events: none;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(2.3rem, 5vw, 4.2rem);
      line-height: 0.94;
      max-width: 10ch;
      margin-bottom: 14px;
    }

    .hero p,
    .subtle,
    .card p {
      color: var(--muted);
      line-height: 1.55;
    }
